<!DOCTYPE html>
<html lang="en" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OLED Media Multitool | Bleenk</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/framer-motion@10.16.4/dist/framer-motion.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://unpkg.com/@ffmpeg/ffmpeg@0.12.7/dist/umd/ffmpeg.js"></script>
    <script src="https://unpkg.com/@ffmpeg/util@0.12.1/dist/umd/index.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap');
        
        :root {
            --accent: #00ff99;
            --accent-glow: rgba(0, 255, 153, 0.3);
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: #050505;
            color: #ededed;
            overflow-x: hidden;
        }

        .mono { font-family: 'JetBrains Mono', monospace; }

        .card-gradient {
            background: linear-gradient(145deg, rgba(23, 23, 23, 0.8) 0%, rgba(10, 10, 10, 0.8) 100%);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.05);
        }

        .accent-text { color: var(--accent); }
        .accent-bg { background-color: var(--accent); }

        /* Custom Scrollbar */
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: #050505; }
        ::-webkit-scrollbar-thumb { background: #262626; border-radius: 10px; }
        ::-webkit-scrollbar-thumb:hover { background: #404040; }

        .processing-glow {
            animation: processing-pulse 2s infinite ease-in-out;
        }

        @keyframes processing-pulse {
            0% { box-shadow: 0 0 5px var(--accent-glow); }
            50% { box-shadow: 0 0 25px var(--accent-glow); }
            100% { box-shadow: 0 0 5px var(--accent-glow); }
        }

        .canvas-pixelated {
            image-rendering: pixelated;
        }

        input[type=range]::-webkit-slider-thumb {
            -webkit-appearance: none;
            height: 16px;
            width: 16px;
            border-radius: 50%;
            background: var(--accent);
            cursor: pointer;
            box-shadow: 0 0 10px var(--accent-glow);
            margin-top: -6px;
        }
    </style>
    <script>
        window.tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        accent: '#00ff99',
                        dark: {
                            900: '#050505',
                            800: '#0a0a0a',
                            700: '#171717',
                            600: '#262626',
                        }
                    }
                }
            }
        }
    </script>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef, useMemo } = React;
        const { motion, AnimatePresence } = FramerMotion;

        const OLED_WIDTH = 128;
        const OLED_HEIGHT = 64;

        // --- Components ---

        const Card = ({ children, title, className = "" }) => (
            <div className={`card-gradient rounded-2xl p-6 mb-4 ${className}`}>
                {title && <h3 className="text-[10px] font-bold uppercase tracking-[0.2em] text-zinc-500 mb-6">{title}</h3>}
                {children}
            </div>
        );

        const Slider = ({ label, value, min, max, step = 1, onChange, unit = "" }) => (
            <div className="mb-6">
                <div className="flex justify-between mb-3">
                    <label className="text-xs font-semibold text-zinc-400 uppercase tracking-wider">{label}</label>
                    <span className="text-xs font-mono accent-text bg-accent/10 px-2 py-0.5 rounded">{value}{unit}</span>
                </div>
                <input 
                    type="range" 
                    min={min} 
                    max={max} 
                    step={step} 
                    value={value} 
                    onChange={(e) => onChange(parseFloat(e.target.value))}
                    className="w-full h-1 bg-zinc-800 rounded-lg appearance-none cursor-pointer"
                />
            </div>
        );

        const Button = ({ children, onClick, variant = "primary", disabled = false, className = "" }) => {
            const base = "px-4 py-3 rounded-xl font-bold transition-all flex items-center justify-center gap-2 disabled:opacity-40 disabled:cursor-not-allowed active:scale-95";
            const variants = {
                primary: "accent-bg text-black hover:shadow-[0_0_20px_rgba(0,255,153,0.4)]",
                secondary: "bg-zinc-800 text-white hover:bg-zinc-700 border border-zinc-700",
                outline: "border border-zinc-800 text-zinc-400 hover:text-white hover:border-zinc-600 bg-zinc-900/50"
            };
            return (
                <button onClick={onClick} disabled={disabled} className={`${base} ${variants[variant]} ${className}`}>
                    {children}
                </button>
            );
        };

        // --- Main App ---

        const App = () => {
            const [file, setFile] = useState(null);
            const [fileType, setFileType] = useState(null);
            const [isProcessing, setIsProcessing] = useState(false);
            const [progress, setProgress] = useState(0);
            const [ffmpegLoaded, setFfmpegLoaded] = useState(false);
            
            // Settings
            const [brightness, setBrightness] = useState(0);
            const [contrast, setContrast] = useState(1);
            const [ditherIntensity, setDitherIntensity] = useState(1);
            const [fps, setFps] = useState(10);
            const [maxDuration, setMaxDuration] = useState(10);

            // Data
            const [frames, setFrames] = useState([]);
            const [currentFrameIdx, setCurrentFrameIdx] = useState(0);
            const [isPlaying, setIsPlaying] = useState(false);
            
            const ffmpegRef = useRef(null);
            const previewCanvasRef = useRef(null);
            const playIntervalRef = useRef(null);

            const fileUrl = useMemo(() => file ? URL.createObjectURL(file) : null, [file]);

            useEffect(() => {
                if (window.lucide) window.lucide.createIcons();
            }, [file, isProcessing, frames, isPlaying]);

            useEffect(() => {
                loadFFmpeg();
                return () => {
                    if (playIntervalRef.current) clearInterval(playIntervalRef.current);
                    if (fileUrl) URL.revokeObjectURL(fileUrl);
                };
            }, []);

            const loadFFmpeg = async () => {
                if (typeof window.FFmpegWASM === 'undefined') {
                    console.error("FFmpegWASM not loaded");
                    return;
                }
                const { FFmpeg } = window.FFmpegWASM;
                const { toBlobURL } = window.FFmpegUtil;
                const baseURL = 'https://unpkg.com/@ffmpeg/core@0.12.6/dist/umd';
                const ffmpeg = new FFmpeg();
                
                try {
                    await ffmpeg.load({
                        coreURL: await toBlobURL(`${baseURL}/ffmpeg-core.js`, 'text/javascript'),
                        wasmURL: await toBlobURL(`${baseURL}/ffmpeg-core.wasm`, 'application/wasm'),
                    });
                    ffmpegRef.current = ffmpeg;
                    setFfmpegLoaded(true);
                } catch (err) {
                    console.error("Failed to load FFmpeg", err);
                }
            };

            const handleFileChange = (e) => {
                const selectedFile = e.target.files[0];
                if (!selectedFile) return;
                setFile(selectedFile);
                setFileType(selectedFile.type.startsWith('video/') ? 'video' : 'image');
                setFrames([]);
                setCurrentFrameIdx(0);
                setIsPlaying(false);
            };

            const processMedia = async () => {
                if (!file) return;
                setIsProcessing(true);
                setProgress(0);
                try {
                    if (fileType === 'video') await processVideo();
                    else await processImage();
                } catch (err) {
                    console.error("Processing failed", err);
                }
                setIsProcessing(false);
            };

            const processImage = async () => {
                const img = new Image();
                img.src = fileUrl;
                await new Promise(resolve => img.onload = resolve);
                const canvas = document.createElement('canvas');
                canvas.width = OLED_WIDTH;
                canvas.height = OLED_HEIGHT;
                const ctx = canvas.getContext('2d');
                ctx.drawImage(img, 0, 0, OLED_WIDTH, OLED_HEIGHT);
                const frameData = applyOLEDFilters(ctx);
                setFrames([frameData]);
                setCurrentFrameIdx(0);
            };

            const processVideo = async () => {
                const ffmpeg = ffmpegRef.current;
                const { fetchFile } = window.FFmpegUtil;
                const inputName = 'input' + file.name.substring(file.name.lastIndexOf('.'));
                await ffmpeg.writeFile(inputName, await fetchFile(file));
                const duration = Math.min(maxDuration, 30);
                
                ffmpeg.on('progress', ({ progress }) => {
                    setProgress(Math.round(progress * 100));
                });

                await ffmpeg.exec([
                    '-i', inputName,
                    '-t', duration.toString(),
                    '-vf', `fps=${fps},scale=${OLED_WIDTH}:${OLED_HEIGHT},format=gray`,
                    'frame%04d.png'
                ]);

                const files = await ffmpeg.listDir('.');
                const frameFiles = files.filter(f => f.name.startsWith('frame') && f.name.endsWith('.png')).sort((a, b) => a.name.localeCompare(b.name));
                
                const processedFrames = [];
                const tempCanvas = document.createElement('canvas');
                tempCanvas.width = OLED_WIDTH;
                tempCanvas.height = OLED_HEIGHT;
                const tempCtx = tempCanvas.getContext('2d');

                for (let i = 0; i < frameFiles.length; i++) {
                    const data = await ffmpeg.readFile(frameFiles[i].name);
                    const blob = new Blob([data.buffer], { type: 'image/png' });
                    const img = await createImageBitmap(blob);
                    tempCtx.drawImage(img, 0, 0);
                    processedFrames.push(applyOLEDFilters(tempCtx));
                    await ffmpeg.deleteFile(frameFiles[i].name);
                    setProgress(Math.round(((i + 1) / frameFiles.length) * 100));
                }

                setFrames(processedFrames);
                setCurrentFrameIdx(0);
                await ffmpeg.deleteFile(inputName);
            };

            const applyOLEDFilters = (ctx) => {
                const imageData = ctx.getImageData(0, 0, OLED_WIDTH, OLED_HEIGHT);
                const data = imageData.data;
                for (let i = 0; i < data.length; i += 4) {
                    let gray = 0.299 * data[i] + 0.587 * data[i + 1] + 0.114 * data[i + 2];
                    gray += brightness;
                    gray = (gray - 128) * contrast + 128;
                    gray = Math.max(0, Math.min(255, gray));
                    data[i] = data[i+1] = data[i+2] = gray;
                }
                const buffer = new Float32Array(OLED_WIDTH * OLED_HEIGHT);
                for (let i = 0; i < OLED_WIDTH * OLED_HEIGHT; i++) buffer[i] = data[i * 4];
                const oledBuffer = new Uint8Array((OLED_WIDTH * OLED_HEIGHT) / 8);
                for (let y = 0; y < OLED_HEIGHT; y++) {
                    for (let x = 0; x < OLED_WIDTH; x++) {
                        const idx = y * OLED_WIDTH + x;
                        const oldPixel = buffer[idx];
                        const newPixel = oldPixel < 128 ? 0 : 255;
                        buffer[idx] = newPixel;
                        const error = (oldPixel - newPixel) * ditherIntensity;
                        if (x + 1 < OLED_WIDTH) buffer[idx + 1] += error * 7 / 16;
                        if (y + 1 < OLED_HEIGHT) {
                            if (x > 0) buffer[idx + OLED_WIDTH - 1] += error * 3 / 16;
                            buffer[idx + OLED_WIDTH] += error * 5 / 16;
                            if (x + 1 < OLED_WIDTH) buffer[idx + OLED_WIDTH + 1] += error * 1 / 16;
                        }
                        if (newPixel > 0) {
                            const byteIdx = Math.floor(idx / 8);
                            const bitIdx = 7 - (idx % 8);
                            oledBuffer[byteIdx] |= (1 << bitIdx);
                        }
                    }
                }
                return oledBuffer;
            };

            useEffect(() => {
                if (frames.length === 0) return;
                const canvas = previewCanvasRef.current;
                if (!canvas) return;
                const ctx = canvas.getContext('2d');
                const frame = frames[currentFrameIdx];
                const imgData = ctx.createImageData(OLED_WIDTH, OLED_HEIGHT);
                for (let i = 0; i < OLED_WIDTH * OLED_HEIGHT; i++) {
                    const byteIdx = Math.floor(i / 8);
                    const bitIdx = 7 - (i % 8);
                    const val = (frame[byteIdx] & (1 << bitIdx)) ? 255 : 0;
                    const dIdx = i * 4;
                    imgData.data[dIdx] = val === 255 ? 0 : 15;
                    imgData.data[dIdx+1] = val === 255 ? 255 : 15;
                    imgData.data[dIdx+2] = val === 255 ? 153 : 15;
                    imgData.data[dIdx+3] = 255;
                }
                ctx.putImageData(imgData, 0, 0);
            }, [frames, currentFrameIdx]);

            const togglePlay = () => {
                if (isPlaying) {
                    clearInterval(playIntervalRef.current);
                    setIsPlaying(false);
                } else {
                    if (frames.length <= 1) return;
                    setIsPlaying(true);
                    playIntervalRef.current = setInterval(() => {
                        setCurrentFrameIdx(prev => (prev + 1) % frames.length);
                    }, 1000 / fps);
                }
            };

            const exportCpp = () => {
                let output = `// OLED Animation: ${file.name}\n// Frames: ${frames.length}, Width: 128, Height: 64\n#include <avr/pgmspace.h>\n\n`;
                frames.forEach((frame, i) => {
                    output += `const unsigned char frame_${i}[] PROGMEM = {\n  `;
                    for (let j = 0; j < frame.length; j++) {
                        output += `0x${frame[j].toString(16).padStart(2, '0')}${j === frame.length - 1 ? '' : ', '}`;
                        if ((j + 1) % 16 === 0) output += '\n  ';
                    }
                    output += `\n};\n\n`;
                });
                output += `const unsigned char* const animation_frames[] PROGMEM = {\n  `;
                frames.forEach((_, i) => {
                    output += `frame_${i}${i === frames.length - 1 ? '' : ', '}`;
                });
                output += `\n};\n`;
                downloadFile(output, `${file.name.split('.')[0]}_oled.h`, 'text/plain');
            };

            const exportBin = () => {
                const binData = new Uint8Array(frames.length * 1024);
                frames.forEach((frame, i) => binData.set(frame, i * 1024));
                const blob = new Blob([binData], { type: 'application/octet-stream' });
                const url = URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = url;
                a.download = `${file.name.split('.')[0]}.bin`;
                a.click();
            };

            const downloadFile = (content, filename, type) => {
                const blob = new Blob([content], { type });
                const url = URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = url;
                a.download = filename;
                a.click();
            };

            return (
                <div className="min-h-screen p-4 md:p-12 max-w-7xl mx-auto">
                    <header className="flex flex-col md:flex-row justify-between items-start md:items-center mb-16 gap-6">
                        <div>
                            <motion.div 
                                initial={{ opacity: 0, x: -20 }}
                                animate={{ opacity: 1, x: 0 }}
                                className="flex items-center gap-4 mb-2"
                            >
                                <div className="accent-bg p-2 rounded-xl text-black shadow-[0_0_20px_var(--accent-glow)]">
                                    <i data-lucide="layers" className="w-7 h-7"></i>
                                </div>
                                <h1 className="text-4xl font-black tracking-tighter uppercase">
                                    OLED <span className="accent-text">Multitool</span>
                                </h1>
                            </motion.div>
                            <p className="text-zinc-500 font-medium ml-14">Professional 1-bit Media Pipeline</p>
                        </div>
                        <div className="flex items-center gap-6 bg-zinc-900/50 px-6 py-3 rounded-2xl border border-zinc-800">
                            <div className={`flex items-center gap-3 text-[10px] font-bold tracking-[0.2em] ${ffmpegLoaded ? 'text-accent' : 'text-amber-500'}`}>
                                <div className={`w-2 h-2 rounded-full ${ffmpegLoaded ? 'accent-bg shadow-[0_0_10px_var(--accent)]' : 'bg-amber-500 animate-pulse'}`}></div>
                                {ffmpegLoaded ? 'ENGINE READY' : 'INITIALIZING WASM'}
                            </div>
                        </div>
                    </header>

                    <div className="grid grid-cols-1 lg:grid-cols-12 gap-10">
                        <div className="lg:col-span-4 space-y-8">
                            <Card title="Input Source">
                                <div 
                                    className={`group relative border-2 border-dashed rounded-2xl p-10 transition-all text-center cursor-pointer
                                        ${file ? 'border-accent/40 bg-accent/5' : 'border-zinc-800 hover:border-zinc-700 hover:bg-zinc-900/30'}`}
                                    onClick={() => !isProcessing && document.getElementById('fileInput').click()}
                                >
                                    <input id="fileInput" type="file" className="hidden" accept="image/*,video/*" onChange={handleFileChange} />
                                    <i data-lucide="upload" className={`w-12 h-12 mx-auto mb-4 transition-transform group-hover:-translate-y-1 ${file ? 'accent-text' : 'text-zinc-700'}`}></i>
                                    {file ? (
                                        <div className="space-y-1">
                                            <p className="text-sm font-bold truncate px-4">{file.name}</p>
                                            <p className="text-[10px] text-zinc-500 uppercase tracking-widest">{(file.size / 1024 / 1024).toFixed(2)} MB • {fileType}</p>
                                        </div>
                                    ) : (
                                        <p className="text-xs font-bold text-zinc-600 uppercase tracking-widest">Select Media File</p>
                                    )}
                                </div>
                            </Card>

                            <Card title="Parameters">
                                <Slider label="Brightness" value={brightness} min={-100} max={100} onChange={setBrightness} />
                                <Slider label="Contrast" value={contrast} min={0.5} max={3} step={0.1} onChange={setContrast} />
                                <Slider label="Dither" value={ditherIntensity} min={0} max={2} step={0.1} onChange={setDitherIntensity} />
                                
                                <AnimatePresence>
                                    {fileType === 'video' && (
                                        <motion.div initial={{ opacity: 0, height: 0 }} animate={{ opacity: 1, height: 'auto' }} exit={{ opacity: 0, height: 0 }} className="overflow-hidden">
                                            <Slider label="Target FPS" value={fps} min={1} max={30} onChange={setFps} />
                                            <Slider label="Max Duration" value={maxDuration} min={1} max={30} unit="s" onChange={setMaxDuration} />
                                        </motion.div>
                                    )}
                                </AnimatePresence>

                                <Button className="w-full mt-4" onClick={processMedia} disabled={!file || !ffmpegLoaded || isProcessing}>
                                    {isProcessing ? (
                                        <><i data-lucide="refresh-cw" className="w-4 h-4 animate-spin"></i> Processing {progress}%</>
                                    ) : (
                                        <><i data-lucide="zap" className="w-4 h-4"></i> Generate Data</>
                                    )}
                                </Button>
                            </Card>

                            <Card title="Export">
                                <div className="grid grid-cols-1 gap-3">
                                    <Button variant="outline" onClick={exportCpp} disabled={frames.length === 0}>
                                        <i data-lucide="code" className="w-4 h-4"></i> C++ Header (.h)
                                    </Button>
                                    <Button variant="outline" onClick={exportBin} disabled={frames.length === 0}>
                                        <i data-lucide="binary" className="w-4 h-4"></i> Binary Stream (.bin)
                                    </Button>
                                </div>
                            </Card>
                        </div>

                        <div className="lg:col-span-8 space-y-8">
                            <div className="grid grid-cols-1 xl:grid-cols-2 gap-8">
                                <Card title="Original" className="flex flex-col items-center justify-center min-h-[340px]">
                                    {file ? (
                                        fileType === 'video' ? (
                                            <video src={fileUrl} className="max-w-full max-h-[260px] rounded-xl shadow-2xl border border-zinc-800" controls />
                                        ) : (
                                            <img src={fileUrl} className="max-w-full max-h-[260px] rounded-xl shadow-2xl border border-zinc-800" />
                                        )
                                    ) : (
                                        <div className="text-zinc-800 flex flex-col items-center opacity-40">
                                            <i data-lucide="image" className="w-16 h-16 mb-4"></i>
                                            <p className="text-[10px] font-bold uppercase tracking-[0.2em]">Waiting for input</p>
                                        </div>
                                    )}
                                </Card>

                                <Card title="OLED Simulation" className="flex flex-col items-center justify-center min-h-[340px]">
                                    <div className={`relative p-6 bg-[#050505] rounded-2xl border-2 border-zinc-900 shadow-[0_0_50px_rgba(0,0,0,0.5)] ${isProcessing ? 'processing-glow' : ''}`}>
                                        <canvas ref={previewCanvasRef} width={OLED_WIDTH} height={OLED_HEIGHT} className="canvas-pixelated w-[256px] h-[128px] md:w-[320px] md:h-[160px]"></canvas>
                                        
                                        {frames.length > 1 && (
                                            <div className="absolute -bottom-14 left-0 right-0 flex items-center gap-4 bg-zinc-900/80 backdrop-blur p-3 rounded-xl border border-zinc-800">
                                                <button onClick={togglePlay} className="w-8 h-8 rounded-lg accent-bg text-black flex items-center justify-center hover:scale-105 transition-transform">
                                                    <i data-lucide={isPlaying ? "pause" : "play"} className="w-4 h-4"></i>
                                                </button>
                                                <div className="flex-1 h-1 bg-zinc-800 rounded-full overflow-hidden">
                                                    <div className="h-full accent-bg transition-all duration-100" style={{ width: `${(currentFrameIdx / (frames.length - 1)) * 100}%` }}></div>
                                                </div>
                                                <span className="text-[10px] font-mono text-zinc-500">{currentFrameIdx + 1}/{frames.length}</span>
                                            </div>
                                        )}
                                    </div>
                                </Card>
                            </div>

                            <Card title="System Logs">
                                <div className="space-y-3 font-mono text-[10px]">
                                    <div className="flex justify-between border-b border-zinc-800/50 pb-2">
                                        <span className="text-zinc-500 uppercase tracking-widest">WASM Engine</span>
                                        <span className={ffmpegLoaded ? 'text-accent' : 'text-zinc-600'}>{ffmpegLoaded ? 'v0.12.7 ACTIVE' : 'LOADING...'}</span>
                                    </div>
                                    <div className="flex justify-between border-b border-zinc-800/50 pb-2">
                                        <span className="text-zinc-500 uppercase tracking-widest">Memory Isolation</span>
                                        <span className="text-zinc-400">COOP/COEP ENABLED</span>
                                    </div>
                                    <div className="flex justify-between border-b border-zinc-800/50 pb-2">
                                        <span className="text-zinc-500 uppercase tracking-widest">Output Format</span>
                                        <span className="text-zinc-400">128x64 1-BIT MONOCHROME</span>
                                    </div>
                                    {isProcessing && (
                                        <motion.div initial={{ opacity: 0 }} animate={{ opacity: 1 }} className="pt-2">
                                            <div className="flex justify-between text-accent mb-2">
                                                <span className="uppercase tracking-widest">Pipeline Progress</span>
                                                <span>{progress}%</span>
                                            </div>
                                            <div className="w-full h-1 bg-zinc-900 rounded-full overflow-hidden">
                                                <div className="h-full accent-bg" style={{ width: `${progress}%` }}></div>
                                            </div>
                                        </motion.div>
                                    )}
                                </div>
                            </Card>
                        </div>
                    </div>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
