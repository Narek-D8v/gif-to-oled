<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OLED GIF Studio Pro</title>
    <script src="https://unpkg.com/gifuct-js@2.1.2/dist/gifuct-js.min.js"></script>
    <style>
        :root { --bg: #0d1117; --card: #161b22; --accent: #58a6ff; --text: #c9d1d9; --green: #238636; --border: #30363d; }
        body { font-family: -apple-system, sans-serif; background: var(--bg); color: var(--text); display: flex; justify-content: center; padding: 20px; margin: 0; }
        .app { width: 100%; max-width: 800px; background: var(--card); border: 1px solid var(--border); border-radius: 12px; padding: 24px; box-shadow: 0 8px 24px rgba(0,0,0,0.5); }
        .header { display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid var(--border); padding-bottom: 15px; margin-bottom: 20px; }
        
        /* Progress Bar Styles */
        .progress-container { width: 100%; height: 8px; background: #21262d; border-radius: 4px; margin: 15px 0; overflow: hidden; display: none; }
        .progress-bar { height: 100%; width: 0%; background: var(--accent); transition: width 0.1s; box-shadow: 0 0 10px var(--accent); }
        
        .drop-zone { border: 2px dashed var(--border); border-radius: 8px; padding: 40px; text-align: center; cursor: pointer; display: block; margin-bottom: 20px; }
        .drop-zone:hover { border-color: var(--accent); background: #1f242c; }
        canvas { background: #000; border: 2px solid var(--accent); border-radius: 4px; display: block; margin: 10px auto; image-rendering: pixelated; width: 256px; height: 128px; }
        .controls { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin: 20px 0; background: #1c2128; padding: 15px; border-radius: 8px; }
        textarea { width: 100%; height: 200px; background: #010409; color: #7ee787; border: 1px solid var(--border); border-radius: 6px; padding: 10px; font-family: monospace; font-size: 11px; box-sizing: border-box; }
        .btn-copy { width: 100%; background: var(--green); color: white; border: none; padding: 12px; border-radius: 6px; font-weight: 600; cursor: pointer; margin-top: 15px; }
        #status { text-align: center; font-size: 14px; margin-bottom: 5px; color: var(--accent); font-weight: bold; }
        input[type="file"] { display: none; }
        .lang-btn { background: transparent; border: 1px solid var(--border); color: var(--accent); cursor: pointer; padding: 5px 10px; border-radius: 6px; }
    </style>
</head>
<body>
    <div class="app">
        <div class="header">
            <h2 id="t-title">OLED GIF Studio</h2>
            <button class="lang-btn" onclick="toggleLang()">EN / RU</button>
        </div>

        <label class="drop-zone" for="fileInput">
            <span id="t-drop">Выберите или перетащите GIF</span>
            <input type="file" id="fileInput" accept="image/gif">
        </label>

        <div id="working-area" style="display:none">
            <div id="status">0%</div>
            <div class="progress-container" id="pContainer" style="display:block">
                <div class="progress-bar" id="pBar"></div>
            </div>
            
            <canvas id="pCanvas" width="128" height="64"></canvas>

            <div class="controls">
                <div style="display:flex; flex-direction:column">
                    <label id="t-thresh" style="font-size:12px; margin-bottom:5px">Порог: <span id="v">128</span></label>
                    <input type="range" id="threshold" min="0" max="255" value="128">
                </div>
                <div style="display:flex; align-items:center; gap:10px">
                    <input type="checkbox" id="invert">
                    <label id="t-inv" style="font-size:14px">Инверсия</label>
                </div>
            </div>
        </div>

        <textarea id="output" readonly></textarea>
        <button class="btn-copy" onclick="copyCode()" id="t-copy">Копировать код</button>
    </div>

    <script>
        let lang = 'ru';
        const txt = {
            ru: { title: "OLED Студия", drop: "Выберите GIF файл", copy: "Копировать код", inv: "Инверсия", thresh: "Порог: ", done: "Готово! Кадров: " },
            en: { title: "OLED Studio", drop: "Drop GIF here", copy: "Copy Code", inv: "Invert", thresh: "Threshold: ", done: "Done! Frames: " }
        };

        function toggleLang() {
            lang = lang === 'ru' ? 'en' : 'ru';
            document.getElementById('t-title').innerText = txt[lang].title;
            document.getElementById('t-drop').innerText = txt[lang].drop;
            document.getElementById('t-copy').innerText = txt[lang].copy;
            document.getElementById('t-inv').innerText = txt[lang].inv;
            document.getElementById('t-thresh').firstChild.textContent = txt[lang].thresh;
        }

        const input = document.getElementById('fileInput');
        const bar = document.getElementById('pBar');
        const stat = document.getElementById('status');
        const output = document.getElementById('output');
        const canvas = document.getElementById('pCanvas');
        const ctx = canvas.getContext('2d');

        let framesCache = [];

        input.onchange = async (e) => {
            const file = e.target.files[0];
            if (!file) return;
            document.getElementById('working-area').style.display = 'block';
            const buffer = await file.arrayBuffer();
            const gif = new GIF(buffer);
            framesCache = await gif.decompressFrames(true);
            render();
        };

        document.getElementById('threshold').oninput = (e) => {
            document.getElementById('v').innerText = e.target.value;
            render();
        };
        document.getElementById('invert').onchange = render;

        async function render() {
            if (!framesCache.length) return;
            const thresh = parseInt(document.getElementById('threshold').value);
            const inv = document.getElementById('invert').checked;
            let code = `const uint8_t PROGMEM anim[][1024] = {\n`;

            for (let i = 0; i < framesCache.length; i++) {
                // Обновление прогресса
                const percent = Math.round(((i + 1) / framesCache.length) * 100);
                bar.style.width = percent + '%';
                stat.innerText = percent + '%';

                const frame = framesCache[i];
                const tempC = document.createElement('canvas');
                tempC.width = frame.dims.width; tempC.height = frame.dims.height;
                const tCtx = tempC.getContext('2d');
                const imgD = tCtx.createImageData(frame.dims.width, frame.dims.height);
                imgD.data.set(frame.patch);
                tCtx.putImageData(imgD, 0, 0);

                ctx.fillStyle = "black";
                ctx.fillRect(0, 0, 128, 64);
                ctx.drawImage(tempC, 0, 0, 128, 64);

                const pixels = ctx.getImageData(0, 0, 128, 64).data;
                let bytes = [];
                for (let y = 0; y < 64; y++) {
                    for (let x = 0; x < 128; x += 8) {
                        let b = 0;
                        for (let bit = 0; bit < 8; bit++) {
                            const idx = ((y * 128) + (x + bit)) * 4;
                            const avg = (pixels[idx] + pixels[idx+1] + pixels[idx+2]) / 3;
                            const active = inv ? avg < thresh : avg > thresh;
                            if (active) b |= (1 << (7 - bit));
                        }
                        bytes.push("0x" + b.toString(16).padStart(2, '0').toUpperCase());
                    }
                }
                code += "  {" + bytes.join(",") + "}" + (i === framesCache.length - 1 ? "" : ",") + "\n";
                
                // Чтобы браузер не зависал и показывал анимацию полоски
                if (i % 5 === 0) await new Promise(r => setTimeout(r, 1));
            }
            code += "};";
            output.value = code;
            stat.innerText = txt[lang].done + framesCache.length;
        }

        function copyCode() {
            output.select();
            document.execCommand('copy');
            const b = document.getElementById('t-copy');
            b.innerText = "✓ Copied!";
            setTimeout(() => b.innerText = txt[lang].copy, 2000);
        }
    </script>
</body>
</html>
