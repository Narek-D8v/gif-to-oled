<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OLED GIF Converter 128x64</title>
    <script src="https://unpkg.com/gifuct-js@2.1.2/dist/gifuct-js.min.js"></script>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #121212; color: #e0e0e0; padding: 20px; margin: 0; }
        .container { max-width: 900px; margin: auto; background: #1e1e1e; padding: 30px; border-radius: 12px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        h1 { color: #00d4ff; margin-bottom: 10px; }
        .controls { margin: 20px 0; padding: 20px; border: 1px dashed #444; border-radius: 8px; }
        #preview-container { margin: 20px 0; display: none; }
        canvas { border: 2px solid #00d4ff; background: #000; box-shadow: 0 0 15px rgba(0, 212, 255, 0.2); image-rendering: pixelated; max-width: 100%; height: auto; }
        textarea { width: 100%; height: 300px; background: #000; color: #33ff33; border: 1px solid #333; border-radius: 4px; padding: 10px; font-family: 'Consolas', monospace; font-size: 12px; resize: vertical; margin-top: 20px; }
        .info { font-size: 0.9em; color: #888; margin-top: 5px; }
        button { background: #00d4ff; color: #000; border: none; padding: 10px 20px; border-radius: 5px; font-weight: bold; cursor: pointer; transition: 0.3s; }
        button:hover { background: #0099cc; }
    </style>
</head>
<body>
    <div class="container">
        <h1>OLED GIF to C++</h1>
        <p>Конвертер анимаций для ESP32 и дисплея SSD1306 (128x64)</p>
        
        <div class="controls">
            <input type="file" id="gifInput" accept="image/gif">
            <div class="info">Совет: используй короткие GIF для экономии памяти.</div>
        </div>

        <div id="preview-container">
            <h3>Предпросмотр (как на OLED):</h3>
            <canvas id="previewCanvas" width="128" height="64"></canvas>
            <div id="status">Обработка кадров...</div>
        </div>

        <textarea id="output" readonly placeholder="Здесь появится код для Arduino IDE..."></textarea>
    </div>

    <script>
        const input = document.getElementById('gifInput');
        const output = document.getElementById('output');
        const previewCanvas = document.getElementById('previewCanvas');
        const ctx = previewCanvas.getContext('2d');
        const status = document.getElementById('status');
        const previewContainer = document.getElementById('preview-container');

        input.onchange = async (e) => {
            const file = e.target.files[0];
            if (!file) return;

            previewContainer.style.display = 'block';
            status.innerText = "Загрузка...";

            const buffer = await file.arrayBuffer();
            const gif = new GIF(buffer);
            const frames = await gif.decompressFrames(true);
            
            let allFramesCode = `// Анимация: ${file.name}\n// Кадров: ${frames.length}\n// Размер: 128x64 пикселей\n\nconst uint8_t PROGMEM animation_frames[][1024] = {\n`;
            
            status.innerText = `Обработано кадров: 0 / ${frames.length}`;

            for (let i = 0; i < frames.length; i++) {
                const frame = frames[i];
                
                // Временный холст для распаковки кадра
                const tempCanvas = document.createElement('canvas');
                tempCanvas.width = frame.dims.width;
                tempCanvas.height = frame.dims.height;
                const tempCtx = tempCanvas.getContext('2d');
                
                const imgData = tempCtx.createImageData(frame.dims.width, frame.dims.height);
                imgData.data.set(frame.patch);
                tempCtx.putImageData(imgData, 0, 0);
                
                // Рисуем на основной холст с масштабированием до 128x64
                ctx.fillStyle = "black";
                ctx.fillRect(0, 0, 128, 64);
                ctx.drawImage(tempCanvas, 0, 0, 128, 64);
                
                // Читаем пиксели и переводим в ч/б массив
                const pixels = ctx.getImageData(0, 0, 128, 64).data;
                let frameBytes = [];

                for (let y = 0; y < 64; y++) {
                    for (let x = 0; x < 128; x += 8) {
                        let byte = 0;
                        for (let bit = 0; bit < 8; bit++) {
                            const idx = ((y * 128) + (x + bit)) * 4;
                            // Яркость (среднее RGB)
                            const r = pixels[idx];
                            const g = pixels[idx+1];
                            const b = pixels[idx+2];
                            const brightness = (r + g + b) / 3;
                            
                            // Порог 128 (черное или белое)
                            if (brightness > 128) {
                                byte |= (1 << (7 - bit));
                            }
                        }
                        frameBytes.push("0x" + byte.toString(16).padStart(2, '0').toUpperCase());
                    }
                }

                allFramesCode += "  {" + frameBytes.join(",") + "}" + (i === frames.length - 1 ? "" : ",") + "\n";
                status.innerText = `Обработано кадров: ${i + 1} / ${frames.length}`;
                
                // Небольшая пауза для визуализации прогресса
                await new Promise(r => setTimeout(r, 10));
            }

            allFramesCode += "};";
            output.value = allFramesCode;
            status.innerText = "Готово! Скопируй код ниже.";
        };
    </script>
</body>
</html>
